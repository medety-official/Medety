    /* カード全体：Bootstrapのcardデザインに統合 */
      .study-card {
          width: 95%;
          max-width: 650px;
          height: 75vh;
          margin: 20px auto;
          display: flex;
          flex-direction: column;
          align-items: center;
          background-color: #ffffff; /* 白背景に */
          border-radius: 1.25rem; /* Bootstrapの rounded-4 相当 */
          border: none;
          box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* 柔らかい影 */
          overflow: hidden;
      }

      /* 問題エリア：境界線を薄く、余白をゆったり */
      .question-section {
          width: 100%;
          height: 45%;
          display: flex;
          flex-direction: column;
          align-items: center;
          border-bottom: 1px solid #edf2f7;
          padding: 40px 20px;
          box-sizing: border-box;
      }

      #setTitle {
          font-size: 0.9rem;
          color: #6c757d;
          text-transform: uppercase;
          letter-spacing: 1px;
          margin-bottom: 10px;
      }

      #question {
          font-size: 2.2rem; /* 少し大きく */
          font-weight: 800;
          color: #2d3748;
          margin: auto 0;
      }

      #hint {
          font-size: 0.95rem;
          color: #a0aec0;
          background: #f8fafc;
          padding: 8px 16px;
          border-radius: 20px;
          min-height: 1.5rem;
      }

      /* 回答エリア */
      .answer-section {
          width: 100%;
          height: 35%;
          display: flex;
          justify-content: center;
          align-items: center;
          background-color: #ffffff;
      }

      #answer {
          font-size: 1.8rem;
          font-weight: bold;
          color: #0d6efd; /* Bootstrap Primary */
      }

      /* ボタンエリア：下部に固定 */
      .button-container {
          width: 100%;
          height: 20%;
          padding: 0 30px;
          display: flex;
          align-items: center;
          background-color: #f8fafc; /* ボタンエリアだけ薄く色付け */
          box-sizing: border-box;
      }

      .basic-button {
          display: flex;
          gap: 12px;
          flex: 1;
          justify-content: center;
      }

      /* ボタン自体の装飾（Bootstrapのボタン風に上書き） */
      .button-container button {
          border: none;
          padding: 12px 24px;
          border-radius: 50px; /* 角丸ボタン */
          font-weight: bold;
          transition: all 0.2s ease;
          cursor: pointer;
          box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      }

      /* 答えを表示：Primary色 */
      .answer-button button {
          background-color: #0d6efd;
          color: white;
      }

      /* 次の問題へ：Success / Danger色 */
      .next-question-button {
          display: none; /* JSで制御されているはずなのでそのまま */
          gap: 15px;
      }
      .next-question-button button:first-child { background-color: #dc3545; color: white; } /* 覚えてない */
      .next-question-button button:last-child { background-color: #198754; color: white; }  /* 覚えた */

      /* 💡ボタン：丸いアウトライン */
      .hint-button button {
          width: 45px;
          height: 45px;
          padding: 0 !important;
          display: flex;
          align-items: center;
          justify-content: center;
          background-color: white;
          border: 2px solid #e2e8f0 !important;
          font-size: 1.2rem;
      }

      .button-container button:hover {
          transform: translateY(-2px);
          opacity: 0.9;
      }
