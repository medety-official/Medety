                <div id="button-list-level">
                  <p id="loading-msg" class="text-center text-muted p-3">データを読み込み中...</p>
                </div>

              <script>

                // 1. データの入れ物（グローバルに置く）
                window.levelGroups = {}; 

                window.addEventListener('load', async () => {
                  const container = document.getElementById('button-list-level');
                  
                  try {
                    const allData = await loadMedetyData(); 
                    if (!allData || !allData.etymology) return;

                    // 2. データの仕分け（キーをすべて小文字にして統一）
                    window.levelGroups = {}; 
                    allData.etymology.forEach(item => {
                      let lv = (item.level || item.Level || "").toString().trim().toLowerCase();
                      let cat = (item.category || item.Category || "Other").toString().trim();
                      
                      if (!lv) return;
                      if (!window.levelGroups[lv]) window.levelGroups[lv] = new Set();
                      window.levelGroups[lv].add(cat);
                    });

                    // 3. 表示したい順番（小文字で定義）
                    const levelOrder = ["beginner", "basic", "bedside", "advanced", "enthusiast"];
                    let accordionHtml = "";

                    levelOrder.forEach(lvKey => {
                      const lvId = `lvGroup-${lvKey}`;
                      const count = window.levelGroups[lvKey] ? window.levelGroups[lvKey].size : 0;

                      accordionHtml += `
                        <div class="accordion-item border rounded-4 mb-3 shadow-sm">
                          <h2 class="accordion-header">
                            <button class="accordion-button collapsed fw-bold text-capitalize" type="button" 
                                    data-bs-toggle="collapse" data-bs-target="#${lvId}"
                                    onclick="fillLevelCategories('${lvKey}')">
                              <span class="fs-5 me-2">📚</span> ${lvKey} 
                              <span class="badge rounded-pill bg-light text-dark ms-2 border">${count}カテゴリ</span>
                            </button>
                          </h2>
                          <div id="${lvId}" class="accordion-collapse collapse" data-bs-parent="#studyAccordionLevel">
                            <div id="body-${lvId}" class="accordion-body bg-light d-flex flex-column gap-2">
                              </div>
                          </div>
                        </div>`;
                    });
                    container.innerHTML = accordionHtml;

                  } catch (e) {
                    console.error("Error:", e);
                  }
                });

                // 4. 子ボタン作成関数（windowオブジェクトに紐付けて確実に呼べるようにする）
                window.fillLevelCategories = function(lvKey) {
                  const lvId = `lvGroup-${lvKey}`;
                  const body = document.getElementById(`body-${lvId}`);
                  if (!body || body.innerHTML.trim() !== "") return; 

                  const categorySet = window.levelGroups[lvKey];
                  if (categorySet && categorySet.size > 0) {
                    // カテゴリを並び替える（「その他」を最後にする特別ルール）
                    const categories = Array.from(categorySet).sort((a, b) => {
                      if (a === "その他") return 1;  // aが「その他」なら後ろへ
                      if (b === "その他") return -1; // bが「その他」なら前へ
                      return a.localeCompare(b, 'ja'); // それ以外は通常の五十音・アルファベット順
                    });
                    body.innerHTML = categories.map(cat => `
                      <button class="btn btn-white w-100 text-start p-3 shadow-sm border-0 rounded-3 mb-2" 
                              style="background-color: #ffffff !important;"
                              onclick="location.href='studysetting.html?way=etymology&level=${lvKey}&cat=${encodeURIComponent(cat)}'">
                        <div class="d-flex justify-content-between align-items-center">
                          <span class="fw-bold text-dark">${cat}</span>
                          <i class="bi bi-play-circle-fill text-primary"></i>
                        </div>
                      </button>
                    `).join("");
                  } else {
                    body.innerHTML = '<p class="text-muted small p-2 mb-0 text-center">No categories found.</p>';
                  }
                };

              </script>

                  <script src="api.js"></script> 
                  <script>
                    async function fetchTags(){
                      // 1. データを取る（api.jsで作った仕組みを呼ぶだけ）
                      const allData = await loadMedetyData(); 

                      // 2. 加工する（etymologyの中から「tag」だけを抜き出す）
                      const rootTags = allData.etymology.map(item => item.tag);

                      // 3. 重複を消す
                      const uniqueTags = Array.from(new Set(rootTags));

                      return uniqueTags;

                    }


                    fetchTags();

                    async function start() {
                      // 1. fetchTagsが「リスト」を返してくれるのを、awaitでちゃんと待って、
                      // 2. 届いたリストを「tags」という名前の受け皿に入れる
                      const tags = await fetchTags(); 

                      // 3. リストが手元に届いた「あと」で、ボタンを作る
                      createMyButtons(tags);
                    }

                    start(); // 全ての始まりの合図

                          
                    
                    // 1. ここに引っ越し（みんなが見える共通の場所）
                    let groups = {}; 

                    function createMyButtons(tags) {
                      const container = document.getElementById('button-list');
                      if (!container) return;

                      // 2. groups を新しく作るのではなく、上の共通の箱に入れる
                      groups = {}; 
                      tags.forEach(tag => {
                        const initial = tag[0].toUpperCase();
                        if (!groups[initial]) groups[initial] = [];
                        groups[initial].push(tag);
                      });

                      // 各グループの中身（子ボタンのリスト）を辞書順に並び替える
                      Object.keys(groups).forEach(initial => {
                        groups[initial].sort(); // これだけでアルファベット順になります
                      });

                      // --- ここから下のアコーディオン枠生成コードはそのまま ---
                      let accordionHtml = "";
                      Object.keys(groups).sort().forEach(initial => {
                        const groupId = `group${initial}`;
                        accordionHtml += `
                          <div class="accordion-item border rounded-4 mb-3 shadow-sm">
                            <h2 class="accordion-header">
                              <button class="accordion-button collapsed fw-bold" type="button" 
                                      data-bs-toggle="collapse" data-bs-target="#${groupId}"
                                      onclick="fillAccordion('${initial}')">
                                      <span class="fs-5 me-2">📍</span>
                                      ${initial} から始まる語源
                                      <span class="badge rounded-pill bg-light text-dark ms-2 border">${groups[initial].length}語</span>
                              </button>
                            </h2>

                            <div id="${groupId}" class="accordion-collapse collapse" data-bs-parent="#button-list">
                              <div id="body-${initial}" class="accordion-body bg-light d-flex flex-column gap-2"></div>
                            </div>

                          </div>`;
                      });
                      container.innerHTML = accordionHtml;
                    }

                    // 3. これで window.fillAccordion が groups を見つけられるようになります
                    window.fillAccordion = (initial) => {
                      console.log(initial + " を展開します");
                      const body = document.getElementById(`body-${initial}`);
                      if (!body || body.innerHTML !== "") return;

                      if (groups[initial]) {
                        const buttons = groups[initial].map(tag => `
                          <button class="btn btn-white w-100 text-start p-3 shadow-sm border-0 rounded-3 mb-2" 
                                  style="background-color: #ffffff !important; max-width: 96%;"
                                  onclick="location.href='studysetting.html?way=rootgroup&set=${tag}'">
                            <div class="d-flex justify-content-between align-items-center">
                              <span class="fw-bold text-dark">${tag}</span>
                              <i class="bi bi-play-circle-fill text-primary"></i>
                            </div>
                          </button>
                        `).join("");
                        body.innerHTML = buttons;
                      }
                    };
                  </script>
