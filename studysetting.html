    <script>
        // --- 以前のロジックをそのまま移植 ---
        const params = new URLSearchParams(window.location.search);
        const setMode = params.get("way"); // etymology か　area か rootgroup か

        // 1. まず「外側」で setName を用意しておく（中身は空っぽ）
        let setName = ""; 

        if (setMode === "etymology") {
            // 2. etymologyモードの時は、levelとcatを合体させて代入
            const level = params.get('level') || "";
            const cat = params.get('cat') || "";
            
            // 見栄えを良くするために「:」などで繋ぐのがオススメです
            setName = `${level} > ${cat}`; 

        } else {
            // 3. それ以外のモードは、従来通り "set" を代入
            setName = params.get("set") || "";
        }

        // 4. あとはこの setName を HTML のタイトル要素に入れるだけ！
        // 例：document.getElementById('quiz-title').innerText = setName;
        console.log("今回のタイトル:", setName);


        
        document.getElementById("setTitle").textContent = setName;

        let selectedLanguage = 'en-jp';
        let selectedOrder = 'specific';

        function setLanguage(val, btnElement) {
            selectedLanguage = val;
            updateButtonStyles(btnElement);
        }

        function setOrder(val, btnElement) {
            selectedOrder = val;
            updateButtonStyles(btnElement);
        }


        function updateButtonStyles(clickedButton) {
            // 同じグループ内のボタンから active-mode を消して、押したのにつける
            const parent = clickedButton.parentElement;
            const buttons = parent.querySelectorAll('button');
            buttons.forEach(btn => btn.classList.remove('active-mode'));
            clickedButton.classList.add('active-mode');
        }

        function startStudy() {
            // 共通のパラメータ
            let url = `duringstudy.html?way=${setMode}&language=${selectedLanguage}&order=${selectedOrder}&set=${encodeURIComponent(setName)}`;

            if (setMode === "etymology") {
                // 【新設】語源モードなら level と cat を追加
                // URLSearchParamsから現在の値を引き継ぐか、変数から取得します
                const urlParams = new URLSearchParams(window.location.search);
                const level = urlParams.get('level') || "";
                const cat = urlParams.get('cat') || "";
                
                url += `&level=${encodeURIComponent(level)}&cat=${encodeURIComponent(cat)}`;
            }

            location.href = url;
        }
    </script>
